name: Build and Upload GDExtension

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "rust/**" # Only run if Rust code changes

jobs:
  # Matrix Build
  build-binaries:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    env:
      # Make sure macOS binary works on older Macs, not just the latest
      MACOSX_DEPLOYMENT_TARGET: "11.0" 

    strategy:
      fail-fast: false # If Windows fails, let Mac and Linux keep building to see all errors
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: dll
            prefix: reia_backend
            out_folder: windows
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
            prefix: libreia_backend
            out_folder: linux
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dylib
            prefix: libreia_backend
            out_folder: macos

    defaults:
      run:
        working-directory: ./rust

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./rust -> target" # Tells the cache where Cargo is running

      - name: Build Debug
        run: cargo build --target ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage Artifacts
        shell: bash
        run: |
          mkdir -p ../staging/${{ matrix.out_folder }}
          cp target/${{ matrix.target }}/debug/${{ matrix.prefix }}.${{ matrix.ext }} ../staging/${{ matrix.out_folder }}/${{ matrix.prefix }}.debug.${{ matrix.ext }}
          cp target/${{ matrix.target }}/release/${{ matrix.prefix }}.${{ matrix.ext }} ../staging/${{ matrix.out_folder }}/${{ matrix.prefix }}.release.${{ matrix.ext }}

      - name: Upload Temporary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.out_folder }}
          path: staging/${{ matrix.out_folder }}
          retention-days: 1 # We only need this for the next job

  # Hash & Publish
  publish:
    name: Generate Manifest and Upload to R2
    needs: build-binaries # This forces it to wait for all 3 OS builds to finish
    runs-on: ubuntu-latest
    
    steps:
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: staging
          pattern: binaries-*
          merge-multiple: true # Strips the "binaries-" folder wrapper, leaving just /windows, /linux, /macos

      - name: Generate Manifest and Hashes
        run: |
          cd staging
          WIN_DBG_HASH=$(sha256sum windows/reia_backend.debug.dll | awk '{ print $1 }')
          WIN_REL_HASH=$(sha256sum windows/reia_backend.release.dll | awk '{ print $1 }')
          LIN_DBG_HASH=$(sha256sum linux/libreia_backend.debug.so | awk '{ print $1 }')
          LIN_REL_HASH=$(sha256sum linux/libreia_backend.release.so | awk '{ print $1 }')
          MAC_DBG_HASH=$(sha256sum macos/libreia_backend.debug.dylib | awk '{ print $1 }')
          MAC_REL_HASH=$(sha256sum macos/libreia_backend.release.dylib | awk '{ print $1 }')
          COMMIT_HASH=${{ github.sha }}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Create manifest.json
          cat <<EOF > manifest.json
          {
            "commit_hash": "$COMMIT_HASH",
            "build_date": "$DATE",
            "binaries": {
              "Windows": {
                "debug": {"file": "windows/reia_backend.debug.dll", "sha256": "$WIN_DBG_HASH"},
                "release": {"file": "windows/reia_backend.release.dll", "sha256": "$WIN_REL_HASH"}
              },
              "Linux": {
                "debug": {"file": "linux/libreia_backend.debug.so", "sha256": "$LIN_DBG_HASH"},
                "release": {"file": "linux/libreia_backend.release.so", "sha256": "$LIN_REL_HASH"}
              },
              "macOS": {
                "debug": {"file": "macos/libreia_backend.debug.dylib", "sha256": "$MAC_DBG_HASH"},
                "release": {"file": "macos/libreia_backend.release.dylib", "sha256": "$MAC_REL_HASH"}
              }
            }
          }
          EOF

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync staging/ s3://rust-build/latest/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete
